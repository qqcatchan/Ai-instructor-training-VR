<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Instructor Training VR - Chinese Opera Integration</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <header>
        <h1>AI Instructor Training VR — 京劇整合</h1>
        <div class="controls">
            <button id="start-vr">啟動 3D 舞台</button>
            <button id="play-music">播放音樂</button>
            <button id="start-speech">開始語音識別</button>
            <button id="stop-speech">停止語音識別</button>
            <button id="start-gesture">開始姿勢偵測</button>
            <button id="stop-gesture">停止姿勢偵測</button>
        </div>
    </header>

    <main>
        <section id="stage" class="stage"></section>
        <aside class="sidebar">
            <h2>輸出</h2>
            <pre id="speech-output">語音識別結果會顯示於此</pre>
            <pre id="gesture-output">姿勢偵測結果會顯示於此</pre>
        </aside>
    </main>

    <script type="module" src="/src/app.js"></script>
</body>
</html>
